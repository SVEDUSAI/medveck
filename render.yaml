services:
  - type: web
      name: medvek-api
          plan: free
              runtime: node
                  rootDir: apps/api
                      buildCommand: npm install && npx prisma generate && npm run build
                          startCommand: npm run start
                              envVars:
                                    - key: NODE_ENV
                                            value: production
                                                  - key: PORT
                                                          value: 4000
                                                                - key: DATABASE_URL
                                                                        fromDatabase:
                                                                                  name: medvek-db
                                                                                            property: connectionString
                                                                                                  - key: JWT_SECRET
                                                                                                          sync: false
                                                                                                              healthCheckPath: /health
                                                                                                              
                                                                                                              databases:
                                                                                                                - name: medvek-db
                                                                                                                    plan: free
