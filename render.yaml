services:
  - type: web
    name: medvek-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: medvek-prod-secret-2024
      - key: DATABASE_URL
        fromDatabase:
          name: medvek-db
          property: connectionString
      - key: REDIS_URL
        value: ""

databases:
  - name: medvek-db
    plan: free
